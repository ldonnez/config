---
- name: Tap homebrew repositories
  when: ansible_facts.os_family == "Darwin"
  community.general.homebrew_tap:
    name: "hashicorp/tap"
    state: present
  tags:
    - install

- name: Install terraform with homebrew
  when: ansible_facts.os_family == "Darwin"
  community.general.homebrew:
    name: "hashicorp/tap/terraform"
    state: present
  tags:
    - install

- name: Check if terraform is installed
  when: ansible_facts.os_family == "Debian"
  ansible.builtin.stat:
    path: /usr/bin/terraform
  register: terraform_bin
  tags:
    - install

- name: Install terraform with apt
  when:
    - ansible_facts.os_family == "Debian"
    - not terraform_bin.stat.exists
  become: true
  tags:
    - install
  block:
    - name: Get hashicorp signing key
      ansible.builtin.get_url:
        url: https://apt.releases.hashicorp.com/gpg
        dest: /etc/apt/keyrings/hashicorp-archive-keyring.asc
        mode: "0644"

    - name: Add terraform to sources list
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/hashicorp-archive-keyring.asc] https://apt.releases.hashicorp.com {{ ansible_facts.distribution_release }} main"
        state: present
        filename: hashicorp

    - name: Install terraform with apt
      ansible.builtin.apt:
        name: terraform
        update_cache: true

    - name: Install terraform-ls with apt
      ansible.builtin.apt:
        name: terraform-ls
        update_cache: true
