- name: Install i3, i3status & i3lock-fancy with apt
  become: true
  ansible.builtin.apt:
    name: ["i3", "i3status", "i3lock-fancy"]
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - install

- name: Install lightdm with apt
  become: true
  ansible.builtin.apt:
    name: lightdm # Simple display manager (login screen)
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - install

- name: Install network-manager with apt
  become: true
  ansible.builtin.apt:
    name: network-manager # network manger with included system tray icon
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - install

- name: Install thunar, thunar-volman & thunar-archive-plugin with apt
  become: true
  ansible.builtin.apt:
    name: [
      "thunar", # file manager
      "thunar-volman", # extension for volumes management
      "thunar-archive-plugin", # extension for extracting & archiving
    ]
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - install

- name: Install dunst with apt
  become: true
  ansible.builtin.apt:
    name: dunst # A highly configurable and lightweight notification daemon.
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - install

- name: Install feh with apt
  become: true
  ansible.builtin.apt:
    name: feh # feh is a lightweight image viewer aimed mainly at users of command line interfaces. This is necessary to configure a desktop wallpaper in ~/.config/i3/scripts/startup.sh.
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - install

- name: Install materia gtk theme and papirus icon theme with apt
  become: true
  ansible.builtin.apt:
    name: ["materia-gtk-theme", "papirus-icon-theme"]
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - install

- name: Install xprintidle and playerctl with apt
  become: true
  ansible.builtin.apt:
    name: ["xprintidle", "playerctl"] # necessary to check if system is idle in ~/.config/i3/scripts/idle-check.sh
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - install
