---
- name: Install kitty via homebrew cask
  when: ansible_facts.os_family == "Darwin"
  community.general.homebrew_cask:
    name: kitty
    state: present
  tags:
    - install

- name: Install kitty
  when: ansible_facts.os_family == "Debian"
  tags:
    - install
  block:
    - name: Run kitty installation script
      ansible.builtin.shell: |
        set -o pipefail
        curl -L https://sw.kovidgoyal.net/kitty/installer.sh | sh /dev/stdin
      args:
        executable: /bin/bash
        creates: "{{ ansible_facts.user_dir }}/.local/kitty.app/bin/kitty"
      tags:
        - update

    - name: Create symbolic links to add kitty to PATH
      ansible.builtin.file:
        src: "{{ ansible_facts.user_dir }}/.local/kitty.app/bin/kitty"
        dest: "{{ ansible_facts.user_dir }}/.local/bin/kitty"
        state: link
        force: true

    - name: Create symbolic links to add kitten to PATH
      ansible.builtin.file:
        src: "{{ ansible_facts.user_dir }}/.local/kitty.app/bin/kitten"
        dest: "{{ ansible_facts.user_dir }}/.local/bin/kitten"
        state: link
        force: true

    - name: Place the kitty.desktop file somewhere it can be found by the OS
      ansible.builtin.copy:
        src: "{{ ansible_facts.user_dir }}/.local/kitty.app/share/applications/kitty.desktop"
        dest: "{{ ansible_facts.user_dir }}/.local/share/applications/"
        owner: "{{ ansible_facts.user_id }}"
        mode: "0644"

    - name: Add the kitty-open.desktop file to open files and with file manager
      ansible.builtin.copy:
        src: "{{ ansible_facts.user_dir }}/.local/kitty.app/share/applications/kitty-open.desktop"
        dest: "{{ ansible_facts.user_dir }}/.local/share/applications/"
        owner: "{{ ansible_facts.user_id }}"
        mode: "0644"

    - name: Update kitty icon path in desktop file(s)
      ansible.builtin.replace:
        path: "{{ ansible_facts.user_dir }}/.local/share/applications/{{ item }}"
        regexp: "^Icon=kitty$"
        replace: "Icon={{ ansible_facts.user_dir }}/.local/kitty.app/share/icons/hicolor/256x256/apps/kitty.png"
      loop:
        - kitty.desktop
        - kitty-open.desktop

    - name: Update kitty exec path in desktop file(s)
      ansible.builtin.replace:
        path: "{{ ansible_facts.user_dir }}/.local/share/applications/{{ item }}"
        regexp: "^Exec=kitty$"
        replace: "Exec={{ ansible_facts.user_dir }}/.local/kitty.app/bin/kitty"
      loop:
        - kitty.desktop
        - kitty-open.desktop

    - name: Make xdg-terminal-exec
      ansible.builtin.copy:
        content: "kitty.desktop"
        dest: "{{ ansible_facts.user_dir }}/.config/xdg-terminals.list"
        mode: "0644"
