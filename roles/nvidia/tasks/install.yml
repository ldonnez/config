---
- name: Detect NVIDIA graphics adapter
  ansible.builtin.shell: |
    set -o pipefail
    lspci | grep -Ei '(VGA|3D).*NVIDIA'
  register: nvidia_gpu_detect
  failed_when: false
  changed_when: false
  tags:
    - install

- name: Install linux-headers-amd64, nvidia-driver & firmware-misc-nonfree with apt
  become: true
  ansible.builtin.apt:
    pkg:
      - linux-headers-amd64
      - nvidia-driver
      - firmware-misc-nonfree
      - mesa-utils
  when: nvidia_gpu_detect.rc == 0
  tags:
    - install

# Prevents Nvidia Optimus from working. More info -> https://wiki.debian.org/NVIDIA%20Optimus
- name: Remove the outdated xserver-xorg-video-intel package if present
  become: true
  ansible.builtin.apt:
    name: xserver-xorg-video-intel
    state: absent
  when: nvidia_gpu_detect.rc == 0
  tags:
    - install
