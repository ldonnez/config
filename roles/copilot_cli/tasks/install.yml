---
- name: Install copilot cli noninteractive with curl
  when: ansible_facts.os_family == "Debian"
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://gh.io/copilot-install | bash
  args:
    creates: "{{ ansible_facts.user_dir }}/.local/bin/copilot"
    executable: /bin/bash
  tags:
    - install

- name: Upgrade copilot cli
  when: ansible_facts.os_family == "Debian"
  ansible.builtin.command: copilot update
  environment:
    PATH: "{{ ansible_facts.user_dir }}/.local/bin:{{ ansible_facts.env.PATH }}"
  tags:
    - update

- name: Install copilot cli with homebrew
  when: ansible_facts.os_family == "Darwin"
  community.general.homebrew:
    name: copilot-cli
    state: present
  tags:
    - install
