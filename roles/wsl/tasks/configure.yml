---
- name: Create xdg-open that opens URLs/files in Windows
  ansible.builtin.copy:
    dest: "{{ ansible_facts.user_dir }}/.local/bin/xdg-open"
    mode: "0700"
    content: |
      #!/bin/sh
      path="$1"
      if [ -f "$path" ] || [ -d "$path" ]; then
        path=$(wslpath -w "$path" 2>/dev/null || echo "$path")
      fi
      exec powershell.exe -NoProfile -Command "Start-Process '$path'"
  tags:
    - install

- name: Symlink open to xdg-open
  ansible.builtin.file:
    src: "{{ ansible_facts.user_dir }}/.local/bin/xdg-open"
    dest: "{{ ansible_facts.user_dir }}/.local/bin/open"
    state: link
  tags:
    - install

- name: Template wsl.conf to /etc
  become: true
  ansible.builtin.template:
    src: wsl.conf.j2
    dest: /etc/wsl.conf
    mode: "0600"
  tags:
    - install

- name: Configure locales (en_US.UTF-8)
  become: true
  tags:
    - install

  block:
    - name: Ensure locales package is installed
      become: true
      ansible.builtin.apt:
        name: locales
        state: present

    - name: Generate en_US.UTF-8 locale
      become: true
      community.general.locale_gen:
        name: "{{ item }}"
        state: present
      loop:
        - en_US.UTF-8

    - name: Set default system environment locale to use en_US.UTF-8/nl_BE.UTF-8
      become: true
      ansible.builtin.copy:
        dest: /etc/default/locale
        content: |
          LANG=en_US.UTF-8
        mode: "0644"

- name: Notify to restart WSL for changes to take effect
  ansible.builtin.debug:
    msg: "Restart WSL for changes to take effect (wsl --shutdown)"
  tags:
    - install
