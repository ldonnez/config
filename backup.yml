---
- name: Backup to SynologyDrive folder
  hosts: localhost
  connection: local

  vars:
    directories_to_synchronize:
      - name: "dotfiles"
        src: "{{ansible_facts.user_dir}}/dotfiles"
        dest: "{{ansible_facts.user_dir}}/SynologyDrive"
        delete: true

      - name: "config"
        src: "{{ansible_facts.user_dir}}/config"
        dest: "{{ansible_facts.user_dir}}/SynologyDrive"
        delete: true

      - name: "notes"
        src: "{{ansible_facts.user_dir}}/notes"
        dest: "{{ansible_facts.user_dir}}/SynologyDrive"
        delete: true

      - name: "secrets"
        src: "{{ansible_facts.user_dir}}/.secrets"
        dest: "{{ansible_facts.user_dir}}/SynologyDrive"
        delete: true

  tasks:
    - name: Synchronize static dirs
      ansible.builtin.import_role:
        name: synchronize

    - name: Find local project directories
      ansible.builtin.find:
        paths: "{{ ansible_facts.user_dir }}/projects"
        file_type: directory
        recurse: false
      register: local_projects

    - name: Sync each project individually with delete
      when: local_projects.files | length > 0
      ansible.posix.synchronize:
        src: "{{ item.path }}/"
        dest: "{{ ansible_facts.user_dir }}/SynologyDrive/projects/{{ item.path | basename }}"
        recursive: true
        delete: true
        checksum: true
      loop: "{{ local_projects.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
